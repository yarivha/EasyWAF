# EasyWAF Configuration

secret       = "change-this-to-a-random-secret-before-production"
database_url = "sqlite://easywaf.db"

[proxy]
http_port  = 8081        # HTTP reverse proxy port (use 80 in production)
gui_port   = 8080        # Management GUI port
geoip_db   = ""          # Path to GeoLite2-Country.mmdb (leave empty to disable)
acme_webroot = ""        # Path for ACME HTTP-01 challenge files

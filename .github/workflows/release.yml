name: Release

# Triggered by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  # ─── Build .deb and .rpm for each architecture ──────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Prepare sqlx database
        # sqlx's compile-time query! macros validate against a real schema.
        # Apply every migration in order to build the full schema.
        run: |
          sudo apt-get install -y sqlite3
          rm -f easywaf.db
          for f in migrations/*.sql; do
            echo "applying $f"
            sqlite3 easywaf.db < "$f"
          done

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          DATABASE_URL: sqlite://easywaf.db
          # Cross toolchain for aarch64 (ring + bundled sqlite need a target CC).
          # These are ignored when building the x86_64 target.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar

      - name: Stage binary for packaging
        # Ensure target/release/easywaf exists so both packagers resolve the
        # asset path whether or not they rewrite it for --target.
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/easywaf" target/release/easywaf

      - name: Build .deb
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }}

      - name: Build .rpm
        # auto-req disabled: dependency scanning on a cross-built binary is
        # unreliable on the host; the binary only needs glibc which is ubiquitous.
        run: cargo generate-rpm --target ${{ matrix.target }} --auto-req disabled

      - name: Collect packages
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/debian/*.deb out/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm out/
          ls -la out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: out/*

  # ─── Create the GitHub Release ──────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"     # v0.1.0 -> 0.1.0
          echo "Extracting notes for version: $VERSION"

          # Pull the section under "## [VERSION]" up to the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/           { exit }
            grab                       { print }
          ' CHANGELOG.md > notes.md

          # Fall back to the [Unreleased] section if no version section exists.
          if [ ! -s notes.md ]; then
            echo "No [$VERSION] section found — falling back to [Unreleased]"
            awk '
              /^## \[Unreleased\]/ { grab=1; next }
              grab && /^## \[/     { exit }
              grab                 { print }
            ' CHANGELOG.md > notes.md
          fi

          # Final fallback so the release is never created with empty notes.
          if [ ! -s notes.md ]; then
            echo "EasyWAF $VERSION" > notes.md
          fi

          echo "----- release notes -----"
          cat notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: EasyWAF ${{ github.ref_name }}
          body_path: notes.md
          files: dist/**/*
          fail_on_unmatched_files: true
